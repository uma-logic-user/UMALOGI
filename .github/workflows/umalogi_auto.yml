name: UMALOGI 自動予想パイプライン

# ============================================================
# スケジュール（JST = UTC+9）
#
#  金曜 20:00 JST = UTC 11:00 → 出馬表取得バッチ
#  土曜 11:45 JST = UTC 02:45 → 午前レース直前予想
#  土曜 14:45 JST = UTC 05:45 → 午後レース直前予想
#  日曜 11:45 JST = UTC 02:45 → 午前レース直前予想
#  日曜 14:45 JST = UTC 05:45 → 午後レース直前予想
#
# 【self-hosted runner 前提】
#   runs-on: [self-hosted, Windows, umalogi]
#   DB / モデルは C:\dev\horse-racing-ai\ 以下に永続保存されるため
#   actions/cache によるDB管理は行わない。
# ============================================================

on:
  schedule:
    # 金曜 20:00 JST — 翌日レース出馬表取得
    - cron: "0 11 * * 5"
    # 土曜 11:45 JST — 午前レース直前予想
    - cron: "45 2 * * 6"
    # 土曜 14:45 JST — 午後レース直前予想
    - cron: "45 5 * * 6"
    # 日曜 11:45 JST — 午前レース直前予想
    - cron: "45 2 * * 0"
    # 日曜 14:45 JST — 午後レース直前予想
    - cron: "45 5 * * 0"
    # 月曜 09:00 JST — 週末レース払戻同期 + 的中評価
    - cron: "0 0 * * 1"
    # 水曜 02:00 JST — モデル週次再学習
    - cron: "0 17 * * 2"

  # 手動実行（GitHub UI から起動可能）
  workflow_dispatch:
    inputs:
      mode:
        description: "実行モード"
        required: true
        default: "friday"
        type: choice
        options:
          - friday
          - prerace
          - train
          - post_race
      race_id:
        description: "レース ID（prerace モード時）"
        required: false
        default: ""
      target_date:
        description: "対象日 YYYYMMDD（friday / post_race モード時）"
        required: false
        default: ""

env:
  # self-hosted runner 上の永続DBパス（環境変数で init_db() が解決する）
  DB_PATH: "C:\\dev\\horse-racing-ai\\data\\umalogi.db"
  MODELS_PATH: "C:\\dev\\horse-racing-ai\\data\\models"
  TZ: "Asia/Tokyo"
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

# ============================================================
# Jobs
# ============================================================

jobs:
  # ----------------------------------------------------------
  # 金曜バッチ: 翌日の出馬表取得
  # ----------------------------------------------------------
  friday-batch:
    name: 金曜バッチ（出馬表取得）
    runs-on: [self-hosted, Windows, umalogi]

    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 11 * * 5') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'friday')

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 依存パッケージを確認・追加インストール
        shell: cmd
        run: pip install -r requirements.txt --quiet

      - name: DB 初期化（テーブル追加マイグレーション）
        shell: cmd
        run: python -c "from src.database.init_db import init_db; init_db()"

      - name: 出馬表取得
        shell: cmd
        run: |
          if "${{ github.event.inputs.target_date }}" NEQ "" (
            python -m src.main_pipeline friday --date ${{ github.event.inputs.target_date }}
          ) else (
            python -m src.main_pipeline friday
          )

      - name: 土曜 暫定予想バッチ（出馬表取得の翌日=土曜）
        shell: cmd
        run: |
          if "${{ github.event.inputs.target_date }}" NEQ "" (
            python -m src.main_pipeline provisional --date ${{ github.event.inputs.target_date }}
          ) else (
            python -m src.main_pipeline provisional
          )
        continue-on-error: true

      - name: 日曜 暫定予想バッチ（土曜の翌日=日曜）
        shell: python
        run: |
          import subprocess, sys, datetime
          saturday = datetime.date.today() + datetime.timedelta(days=1)
          sunday   = saturday + datetime.timedelta(days=1)
          result = subprocess.run(
              [sys.executable, '-m', 'src.main_pipeline', 'provisional',
               '--date', sunday.strftime('%Y%m%d')],
              capture_output=False,
          )
          # 日曜分はエラーでもワークフロー継続
          sys.exit(0)
        continue-on-error: true

      - name: Next.js 用 JSON 生成
        shell: cmd
        run: python web/generate_data.py

      - name: 予想JSONをアーティファクトとして保存
        uses: actions/upload-artifact@v4
        with:
          name: race-data-${{ github.run_id }}
          path: web/src/data/
          retention-days: 7

  # ----------------------------------------------------------
  # レース直前予想
  # ----------------------------------------------------------
  prerace-predict:
    name: レース直前予想
    runs-on: [self-hosted, Windows, umalogi]

    if: |
      (github.event_name == 'schedule' && github.event.schedule != '0 11 * * 5') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'prerace')

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 依存パッケージを確認・追加インストール
        shell: cmd
        run: pip install -r requirements.txt --quiet

      - name: DB 初期化（テーブル追加マイグレーション）
        shell: cmd
        run: python -c "from src.database.init_db import init_db; init_db()"

      # スケジュール遅延チェック: 想定起動時刻から30分以上遅れていたら警告通知
      - name: スケジュール遅延チェック
        shell: python
        run: |
          import os, datetime, requests
          now_jst = datetime.datetime.utcnow() + datetime.timedelta(hours=9)
          # 土日 12:15 / 15:15 を超えていたら遅延警告
          hour, minute = now_jst.hour, now_jst.minute
          is_delayed = (hour == 12 and minute >= 15) or (hour == 15 and minute >= 15) \
                       or hour > 15
          if is_delayed:
              url = os.getenv("DISCORD_WEBHOOK_URL", "")
              if url:
                  msg = f"[UMALOGI] ⚠️ 遅延警告: 直前予想の起動が {now_jst.strftime('%H:%M')} JST — GitHub Actions の遅延を確認してください。"
                  requests.post(url, json={"content": msg}, timeout=10)
              print(f"WARNING: Delayed start at {now_jst.strftime('%H:%M')} JST")
          else:
              print(f"OK: On-time start at {now_jst.strftime('%H:%M')} JST")

      - name: レース直前予想
        shell: cmd
        run: |
          if "${{ github.event.inputs.race_id }}" NEQ "" (
            python -m src.main_pipeline prerace ${{ github.event.inputs.race_id }}
          ) else (
            python scripts/run_prerace_auto.py
          )

      - name: 予想 JSON をアーティファクトとして保存
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: predictions-${{ github.run_id }}
          path: data/predictions/
          retention-days: 30

      - name: Next.js 用 JSON を更新
        shell: cmd
        run: python web/generate_data.py

  # ----------------------------------------------------------
  # レース後処理: 払戻同期 + 評価 + 通知（月曜自動 or 手動）
  # ----------------------------------------------------------
  post-race:
    name: レース後処理（払戻・評価・通知）
    runs-on: [self-hosted, Windows, umalogi]

    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 0 * * 1') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'post_race')

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 依存パッケージを確認・追加インストール
        shell: cmd
        run: pip install -r requirements.txt --quiet

      - name: DB 初期化
        shell: cmd
        run: python -c "from src.database.init_db import init_db; init_db()"

      - name: 払戻データ同期（netkeiba）
        shell: cmd
        run: |
          if "${{ github.event.inputs.target_date }}" NEQ "" (
            python -m src.ops.data_sync payouts --date ${{ github.event.inputs.target_date }}
          ) else (
            python -m src.ops.data_sync payouts
          )

      - name: 着順結果同期
        shell: cmd
        run: |
          if "${{ github.event.inputs.target_date }}" NEQ "" (
            python -m src.ops.data_sync race_results --date ${{ github.event.inputs.target_date }}
          ) else (
            python -m src.ops.data_sync race_results
          )

      - name: 予想照合バッチ（的中判定）
        shell: cmd
        run: python -m src.ml.reconcile

      - name: Discord 的中通知
        shell: cmd
        run: python scripts/notify_discord.py

  # ----------------------------------------------------------
  # モデル再学習（水曜自動 or 手動）
  # ----------------------------------------------------------
  train-models:
    name: モデル再学習
    runs-on: [self-hosted, Windows, umalogi]

    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 17 * * 2') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'train')

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 依存パッケージを確認・追加インストール
        shell: cmd
        run: pip install -r requirements.txt --quiet

      - name: DB 初期化
        shell: cmd
        run: python -c "from src.database.init_db import init_db; init_db()"

      - name: モデル学習
        shell: cmd
        run: python -m src.main_pipeline train

      - name: 学習済みモデルをアーティファクトとして保存（バックアップ）
        uses: actions/upload-artifact@v4
        with:
          name: models-${{ github.run_id }}
          path: data/models/
          retention-days: 90
